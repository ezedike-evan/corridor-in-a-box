# Re-runs the opt-in live-anchor probe (tests/integration/sep31-live.test.ts)
# nightly so the "verified against a real anchor" claim is continuously
# checked, not a one-off capture. Safe to ship before any anchor is
# configured: the test self-skips (describe.skipIf) when the ANCHOR_* secrets
# below are unset, so this job goes green-but-skipped until repo secrets are
# added — no code change needed when that day comes.
name: nightly-live-anchor
on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec vitest run tests/integration/sep31-live.test.ts
        env:
          # Known-good public values for every var here (SDF test anchor) are
          # documented in .env.example; only CORRIDOR_SIGNER_SECRET is sensitive.
          ANCHOR_HOME_DOMAIN: ${{ secrets.ANCHOR_HOME_DOMAIN }}
          ANCHOR_SEP31_TRANSFER_SERVER: ${{ secrets.ANCHOR_SEP31_TRANSFER_SERVER }}
          ANCHOR_SEP31_QUOTE_SERVER: ${{ secrets.ANCHOR_SEP31_QUOTE_SERVER }}
          ANCHOR_SEP31_WEB_AUTH: ${{ secrets.ANCHOR_SEP31_WEB_AUTH }}
          ANCHOR_SEP31_KYC_SERVER: ${{ secrets.ANCHOR_SEP31_KYC_SERVER }}
          ANCHOR_ASSET_ISSUER: ${{ secrets.ANCHOR_ASSET_ISSUER }}
          ANCHOR_DEST_ASSET: ${{ secrets.ANCHOR_DEST_ASSET }}
          CORRIDOR_SIGNER_SECRET: ${{ secrets.CORRIDOR_SIGNER_SECRET }}
