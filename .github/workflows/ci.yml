name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Version comes from package.json "packageManager" (pnpm@9.x); do not also
      # pass `version:` here or action-setup errors on the duplicate.
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  # Exercises PostgresIdempotencyStore against a real Postgres (the atomic claim
  # + version-guarded upsert that guard against double-settlement). The test is
  # env-gated, so it only runs when CORRIDOR_TEST_DATABASE_URL points at the
  # service container below; the default `pnpm test` job above skips it.
  integration-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: pg
          POSTGRES_DB: corridor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CORRIDOR_TEST_DATABASE_URL: postgres://postgres:pg@localhost:5432/corridor_test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec vitest run tests/integration/idempotency-pg.test.ts

  # The web/ showcase app is a standalone Next.js project with its own lockfile
  # (intentionally outside the pnpm workspace, see web/README.md), so it gets its
  # own job rather than riding the monorepo gate above.
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Version resolves from the root package.json "packageManager" field.
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      # --ignore-workspace: web/ is intentionally outside the root pnpm workspace,
      # so pnpm must treat it as a standalone project (otherwise it resolves the
      # parent workspace and never installs web/node_modules).
      - run: pnpm install --frozen-lockfile --ignore-workspace
      - run: pnpm typecheck
      - run: pnpm build
