# Publishes @corridor/cli to npm when a `cli-vX.Y.Z` tag is pushed (or manually
# via workflow_dispatch). Needs one repo secret: NPM_TOKEN (an npm automation
# token with publish rights). `--provenance` attests the package was built from
# this repo/workflow, which requires the id-token permission below.
name: release-cli
on:
  push:
    tags: ["cli-v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm --provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Version comes from package.json "packageManager" (pnpm@9.x); do not also
      # pass `version:` here or action-setup errors on the duplicate.
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile

      # Never publish a broken build: full test suite, then build the bundle
      # and smoke-test the actual artifact that will ship.
      - run: pnpm test
      - run: pnpm --filter @corridor/cli build
      - name: Smoke-test the built bin
        run: node packages/cli/dist/index.js validate corridors/reference.corridor.yaml

      - name: Check the tag matches the package version
        if: startsWith(github.ref, 'refs/tags/cli-v')
        run: |
          tag="${GITHUB_REF_NAME#cli-v}"
          pkg="$(node -p "require('./packages/cli/package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "tag cli-v$tag does not match packages/cli version $pkg" >&2
            exit 1
          fi

      - run: npm publish --provenance --access public
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
